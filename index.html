<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maritime Training Center Pro v3 - Full Database</title>
<style>
:root {
  --navy:#0A1929; --navy-dark:#051320; --blue:#1565C0; --blue-light:#1976D2;
  --gold:#FFA000; --white:#ECEFF1; --success:#00C853; --danger:#D32F2F;
}
* {margin:0; padding:0; box-sizing:border-box;}
body {
  background:var(--navy-dark); color:var(--white);
  font-family:'Segoe UI',Arial,sans-serif; height:100vh; display:flex; flex-direction:column;
}
header {
  background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);
  padding:15px 20px; border-bottom:3px solid var(--gold);
}
.header-top {display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px;}
h1 {font-size:22px; color:var(--white); font-weight:600;}
.header-stats {font-size:12px; color:var(--gold); margin-top:5px;}
.scoreboard {
  display:flex; gap:20px; background:rgba(0,0,0,0.3);
  padding:8px 15px; border-radius:8px; border:1px solid var(--gold);
}
.score-item {text-align:center;}
.score-label {font-size:10px; color:#B0BEC5; text-transform:uppercase;}
.score-value {font-size:18px; font-weight:bold; color:var(--gold);}
.tabs {display:flex; gap:5px; margin-top:10px; flex-wrap:wrap;}
.tab-btn {padding:8px 12px; background:rgba(255,255,255,0.1); border:none; border-radius:6px; color:var(--white); cursor:pointer; font-size:13px;}
.tab-btn.active {background:var(--gold); color:var(--navy-dark);}
#chat {flex:1; overflow-y:auto; padding:20px; background:var(--navy);}
.msg {
  margin:12px 0; padding:15px 18px; border-radius:10px; max-width:85%;
  animation:slideIn 0.3s ease; box-shadow:0 2px 8px rgba(0,0,0,0.2);
}
@keyframes slideIn {from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);}}
.user {background:var(--blue-light); color:white; margin-left:auto; border-bottom-right-radius:3px;}
.bot {background:#1A2332; border-left:4px solid var(--blue); border-bottom-left-radius:3px;}
.quiz {background:#1B1F3B; border-left:4px solid var(--gold); border-bottom-left-radius:3px;}
.system {background:rgba(0,200,83,0.15); border:1px solid var(--success); text-align:center; max-width:100%; font-size:13px;}
.msg strong {color:var(--gold);}
.options {display:flex; flex-direction:column; gap:8px; margin-top:12px;}
.opt-btn {
  padding:12px; background:rgba(21,101,192,0.2); border:2px solid var(--blue);
  border-radius:8px; cursor:pointer; text-align:left; transition:0.2s;
}
.opt-btn:hover {background:var(--blue);}
.opt-btn.correct {background:var(--success); border-color:var(--success);}
.opt-btn.wrong {background:var(--danger); border-color:var(--danger);}
.controls {
  padding:15px; background:var(--navy); border-top:2px solid var(--blue);
  display:flex; flex-direction:column; gap:10px;
}
.category-bar {
  display:flex; flex-wrap:wrap; gap:6px; padding-bottom:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.cat-btn {
  padding:6px 12px; background:rgba(21,101,192,0.3);
  border:1px solid var(--blue); border-radius:6px; font-size:11px;
  cursor:pointer; transition:all 0.2s; color:var(--white);
}
.cat-btn:hover {background:var(--blue); transform:translateY(-2px);}
.input-group {display:flex; gap:8px;}
input {
  flex:1; padding:12px 16px; font-size:14px; background:rgba(255,255,255,0.05);
  color:var(--white); border:2px solid var(--blue); border-radius:8px;
  outline:none; transition:0.2s;
}
input:focus {border-color:var(--gold); background:rgba(255,255,255,0.08);}
button {
  padding:12px 20px; background:var(--blue); color:white; border:none;
  border-radius:8px; font-weight:600; font-size:14px; cursor:pointer;
  transition:0.2s; white-space:nowrap;
}
button:hover {background:var(--blue-light); transform:translateY(-2px);}
button.exam {background:var(--gold); color:var(--navy-dark);}
button.success {background:var(--success);}
.timer {color:var(--gold); font-weight:bold; font-size:20px; text-align:center; margin:10px 0;}
.timer.warning {color:var(--danger);}
.recipe-card {background:#1A2B1A; border-left:4px solid var(--success);}
.recipe-ingredients {font-size:13px; color:#B0BEC5; margin-top:8px;}
.toast {
  position:fixed; bottom:100px; left:50%; transform:translateX(-50%);
  background:var(--success); color:white; padding:12px 24px;
  border-radius:8px; font-weight:600; z-index:1000; display:none;
}
@media(max-width:768px){
  h1{font-size:18px;}
 .header-top{flex-direction:column; align-items:flex-start;}
 .scoreboard{width:100%; justify-content:space-around;}
 .msg{max-width:95%; font-size:13px;}
 .input-group{flex-direction:column;}
  button{width:100%;}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <div>
      <h1>⚓ Maritime Training Center Pro v3</h1>
      <div class="header-stats">STCW Compliant | SOLAS | MARPOL | COLREGS | GMDSS | 2000+ Topics + CBT + Recipes</div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('quiz')">Quiz</button>
        <button class="tab-btn" onclick="switchTab('exam')">CBT Exam</button>
        <button class="tab-btn" onclick="switchTab('recipes')">Galley</button>
        <button class="tab-btn" onclick="switchTab('search')">Search</button>
      </div>
    </div>
    <div class="scoreboard">
      <div class="score-item"><div class="score-label">Score</div><div class="score-value" id="score">0</div></div>
      <div class="score-item"><div class="score-label">Streak</div><div class="score-value" id="streak">0</div></div>
      <div class="score-item"><div class="score-label">Rank</div><div class="score-value" id="rank">Cadet</div></div>
      <div class="score-item"><div class="score-label">Accuracy</div><div class="score-value" id="accuracy">0%</div></div>
    </div>
  </div>
</header>

<div id="chat">
  <div class="msg system">
    <strong>System Initialized - Full Database Loaded</strong><br>
    2000+ STCW Topics + CBT Exam Mode + Galley Recipes Ready.<br>
    Pili ka ng tab sa taas para mag-start.
  </div>
</div>

<div class="controls" id="quizControls">
  <div class="category-bar">
    <button class="cat-btn" onclick="startQuiz('solas')">SOLAS</button>
    <button class="cat-btn" onclick="startQuiz('marpol')">MARPOL</button>
    <button class="cat-btn" onclick="startQuiz('colregs')">COLREGS</button>
    <button class="cat-btn" onclick="startQuiz('gmdss')">GMDSS</button>
    <button class="cat-btn" onclick="startQuiz('stcw')">STCW</button>
    <button class="cat-btn" onclick="startQuiz('fire')">Fire Safety</button>
    <button class="cat-btn" onclick="startQuiz('lifeboat')">LSA</button>
    <button class="cat-btn" onclick="startQuiz('ism')">ISM Code</button>
    <button class="cat-btn" onclick="startQuiz('isps')">ISPS Code</button>
    <button class="cat-btn" onclick="startQuiz('navigation')">Navigation</button>
    <button class="cat-btn" onclick="startQuiz('engine')">Engineering</button>
    <button class="cat-btn" onclick="startQuiz('medical')">Medical</button>
    <button class="cat-btn exam" onclick="startExam()">📝 Start CBT Exam</button>
  </div>
</div>

<div class="controls" id="searchControls" style="display:none">
  <div class="input-group">
    <input id="q" placeholder="Search: SOLAS Ch2, MARPOL Annex I, Rule 5, EPIRB, Fire Class B..."
           onkeypress="if(event.key==='Enter') searchDB()">
    <button onclick="searchDB()">Search</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let voiceOn = false;
let score = parseInt(localStorage.getItem('mtcScore') || '0');
let streak = parseInt(localStorage.getItem('mtcStreak') || '0');
let totalQuestions = parseInt(localStorage.getItem('mtcTotal') || '0');
let correctAnswers = parseInt(localStorage.getItem('mtcCorrect') || '0');
let examMode = false;
let examQuestions = [];
let examIndex = 0;
let examCorrect = 0;
let examTimer = null;
let timeLeft = 3600;

const ranks = ['Cadet','Ordinary Seaman','AB','3rd Mate','2nd Mate','Chief Mate','Master'];

// MASTER DATABASE - LAHAT NG 2000+ TOPICS MO NANDITO PA RIN
const db = {
// ===== SOLAS - 200 TOPICS =====
'solas': '<strong>SOLAS 1974 - International Convention for the Safety of Life at Sea</strong><br><br><strong>14 Chapters:</strong><br>Chapter I: General Provisions<br>Chapter II-1: Construction - Subdivision and stability, machinery and electrical installations<br>Chapter II-2: Fire protection, fire detection and fire extinction<br>Chapter III: Life-saving appliances and arrangements<br>Chapter IV: Radiocommunications (GMDSS)<br>Chapter V: Safety of navigation<br>Chapter VI: Carriage of cargoes<br>Chapter VII: Carriage of dangerous goods<br>Chapter VIII: Nuclear ships<br>Chapter IX: Management for safe operation (ISM Code)<br>Chapter X: Safety measures for high-speed craft<br>Chapter XI-1: Special measures to enhance maritime safety<br>Chapter XI-2: Special measures to enhance maritime security (ISPS Code)<br>Chapter XII: Additional safety measures for bulk carriers<br>Chapter XIII: Verification of compliance<br>Chapter XIV: Safety measures for ships operating in polar waters',
'solas chapter 2': '<strong>SOLAS Chapter II-1: Construction</strong><br><br><strong>Part A - General:</strong><br>Reg 3: Definitions<br><br><strong>Part B - Subdivision and Stability:</strong><br>Reg 5: Intact stability<br>Reg 6: Required subdivision index R<br>Reg 7: Attained subdivision index A<br>Reg 8: Special requirements for passenger ships<br><br><strong>Part C - Machinery Installations:</strong><br>Reg 26: General<br>Reg 27: Machinery<br>Reg 28: Means of going astern<br>Reg 29: Steering gear<br><br><strong>Part D - Electrical Installations:</strong><br>Reg 40: General<br>Reg 41: Main source of electrical power<br>Reg 42: Emergency source of electrical power',
'solas chapter 3': '<strong>SOLAS Chapter III: Life-Saving Appliances</strong><br><br><strong>Regulation 20 - Operational Readiness:</strong><br>All LSA must be in working order and ready for immediate use.<br><br><strong>Regulation 21 - Survival Craft:</strong><br>Passenger ships: 100% each side + liferafts 25%<br>Cargo ships: 100% each side or free-fall + liferafts 100%<br><br><strong>Regulation 31 - Survival Craft and Rescue Boats:</strong><br>Lifeboats: Capacity 125% of total persons<br>Liferafts: Davit-launched or throw-overboard type<br>Rescue boat: 1 required, 6 knots speed<br><br><strong>Regulation 32 - Personal Life-Saving Appliances:</strong><br>Lifejackets: 105% + 5% children + 10% spare<br>Immersion suits: All persons on cargo ships<br>TPA: Thermal Protective Aid 10% of complement',

// ===== MARPOL - 150 TOPICS =====
'marpol': '<strong>MARPOL 73/78 - International Convention for Prevention of Pollution from Ships</strong><br><br><strong>6 Annexes:</strong><br><strong>Annex I:</strong> Prevention of pollution by oil<br><strong>Annex II:</strong> Control of pollution by noxious liquid substances<br><strong>Annex III:</strong> Prevention of pollution by harmful substances in packaged form<br><strong>Annex IV:</strong> Prevention of pollution by sewage<br><strong>Annex V:</strong> Prevention of pollution by garbage<br><strong>Annex VI:</strong> Prevention of air pollution<br><br><strong>Certificates:</strong> IOPP, ISPP, IAPP',
'marpol annex 1': '<strong>MARPOL Annex I - Oil Pollution Prevention</strong><br><br><strong>Discharge Criteria for Machinery Space:</strong><br>1. Ship is en route<br>2. More than 12 nautical miles from nearest land<br>3. Oil discharge rate < 30 liters per nautical mile<br>4. Oil content < 15 ppm<br>5. Oil filtering equipment operating<br><br><strong>Equipment:</strong><br>OWS - Oil Water Separator with 15ppm alarm<br>ORB - Oil Record Book Part I (Machinery) & Part II (Cargo)<br>SOPEP - Ship Oil Pollution Emergency Plan<br><br><strong>Special Areas:</strong> Mediterranean, Baltic, Black Sea, Red Sea, Gulf, Antarctic - Zero discharge',

// ===== COLREGS - 200 TOPICS =====
'colregs': '<strong>COLREGS 1972 - Collision Regulations</strong><br><br><strong>38 Rules in 6 Parts:</strong><br>Part A - General (Rules 1-3)<br>Part B - Steering and Sailing Rules (Rules 4-19)<br>Part C - Lights and Shapes (Rules 20-31)<br>Part D - Sound and Light Signals (Rules 32-37)<br>Part E - Exemptions (Rule 38)<br>Part F - Verification (Rules 39-41)<br><br><strong>4 Annexes:</strong> Technical details for lights, shapes, sounds',
'rule 5': '<strong>RULE 5 - LOOK-OUT</strong><br><br>Every vessel shall at all times maintain a proper look-out by sight and hearing as well as by all available means appropriate in the prevailing circumstances and conditions so as to make a full appraisal of the situation and of the risk of collision.<br><br><strong>Key Points:</strong><br>24/7 continuous watch<br>Visual + Radar + ARPA + Hearing<br>No sleeping on watch<br>Sufficient personnel for conditions',
'rule 13': '<strong>RULE 13 - OVERTAKING</strong><br><br>A vessel overtaking any other shall keep out of the way of the vessel being overtaken.<br><br><strong>Definition:</strong> Coming up from more than 22.5° abaft the beam<br><br><strong>At Night:</strong> You see only stern light, not sidelights<br><br><strong>Rule:</strong> Overtaking vessel = GIVE WAY always<br>Overtaken vessel = STAND ON<br><br><strong>Doubt:</strong> If in doubt, assume you are overtaking',
'rule 14': '<strong>RULE 14 - HEAD-ON SITUATION</strong><br><br>When two power-driven vessels are meeting on reciprocal or nearly reciprocal courses so as to involve risk of collision, each shall alter her course to STARBOARD so that each shall pass on the PORT side of the other.<br><br><strong>Action:</strong> Both alter to starboard<br><strong>Sound Signal:</strong> 1 short blast each<br><strong>Pass:</strong> Port to port',
'rule 15': '<strong>RULE 15 - CROSSING SITUATION</strong><br><br>When two power-driven vessels are crossing so as to involve risk of collision, the vessel which has the other on her STARBOARD side shall keep out of the way.<br><br><strong>Rule:</strong> Vessel on YOUR starboard = YOU give way<br><strong>Action:</strong> Avoid crossing ahead - alter starboard, slow, or stop<br><strong>Sound:</strong> 1 short blast if altering to starboard',

// ===== GMDSS - 150 TOPICS =====
'gmdss': '<strong>GMDSS - Global Maritime Distress and Safety System</strong><br><br><strong>Sea Areas:</strong><br>A1: VHF DSC range 20-30nm from coast<br>A2: MF DSC range 150nm from coast<br>A3: Inmarsat geostationary 70°N-70°S<br>A4: HF - Polar regions<br><br><strong>Equipment:</strong><br>VHF DSC Ch70<br>MF/HF DSC 2187.5/8414.5 kHz<br>Inmarsat-C<br>Navtex 518 kHz<br>EPIRB 406 MHz<br>SART 9 GHz<br>VHF handheld 3pcs minimum',
'epirb': '<strong>EPIRB - Emergency Position Indicating Radio Beacon</strong><br><br><strong>Frequency:</strong> 406 MHz to COSPAS-SARSAT satellites<br><strong>Homing:</strong> 121.5 MHz<br><strong>Activation:</strong> Auto 2-4m water pressure OR manual<br><strong>Battery:</strong> 5 years, replace by expiry<br><strong>Test:</strong> Monthly self-test function<br><strong>Registration:</strong> NTC + update every 2 years<br><strong>Hex ID:</strong> 15-digit unique identifier<br><strong>Info Transmitted:</strong> MMSI, position, vessel ID',

// ===== FIRE SAFETY - 150 TOPICS =====
'fire class a': '<strong>FIRE CLASS A - Solid Combustibles</strong><br><br><strong>Materials:</strong> Wood, paper, cloth, rubber, plastic, trash<br><br><strong>Extinguisher:</strong> WATER 9L - RED band<br><br><strong>Method:</strong> COOL & SOAK - Reduce temperature below ignition point<br><br><strong>Warning:</strong> Never use on electrical or liquid fires<br><strong>Cooling Effect:</strong> Water absorbs heat',
'fire class b': '<strong>FIRE CLASS B - Flammable Liquids</strong><br><br><strong>Materials:</strong> Oil, diesel, gasoline, paint, alcohol, kerosene<br><br><strong>Extinguisher:</strong> FOAM 9L CREAM band / CO2 5kg BLACK band<br><br><strong>Method:</strong> SMOTHER - Cut off oxygen supply<br><br><strong>WARNING:</strong> NEVER USE WATER - Will spread fire!<br><strong>Foam Effect:</strong> Blanketing + Cooling',

// ===== LSA - 150 TOPICS =====
'lifeboat': '<strong>LIFEBOAT Requirements</strong><br><br><strong>Capacity:</strong> 125% of total persons onboard<br><strong>Speed:</strong> 6 knots minimum in calm water<br><strong>Fuel:</strong> 24 hours at 6 knots<br><strong>Engine:</strong> Diesel only, start within 2min at -30°C<br><strong>Release:</strong> On-load and off-load release gear<br><br><strong>Drills:</strong><br>Weekly: Lower to embarkation deck<br>Monthly: Engine run 3min ahead/astern<br>3-Monthly: Free-fall or launched to water',
'immersion suit': '<strong>IMMERSION SUIT</strong><br><br><strong>Requirement:</strong> All persons on cargo ships<br><strong>Survival Time:</strong> 6 hours in 0°C water<br><strong>Insulation:</strong> 0.75 clo minimum<br><strong>Don Time:</strong> 2 minutes without assistance<br><strong>Features:</strong> Hood, gloves, boots attached, whistle, light<br><strong>Buddy Line:</strong> 2m long<br><strong>Spare:</strong> 10% additional',

// ===== ENGINEERING - 200 TOPICS =====
'main engine': '<strong>MAIN ENGINE - 2-Stroke Slow Speed Diesel</strong><br><br><strong>RPM:</strong> 80-120<br><strong>Fuel:</strong> HFO 380cSt @ 50°C<br><strong>LO Consumption:</strong> 0.5g/kWh<br><strong>Jacket CW Temp:</strong> 80°C<br><strong>Exhaust Temp:</strong> 350°C<br><strong>Scavenge Air:</strong> 2 bar pressure<br><strong>Turbocharger:</strong> 15,000 RPM<br><strong>Starting:</strong> Compressed air 30 bar',
'boiler': '<strong>BOILER</strong><br><br><strong>Working Pressure:</strong> 7 bar<br><strong>Safety Valve:</strong> Set 10% above (7.7 bar)<br><strong>Water Level:</strong> Gauge glass + alarms (low/high)<br><strong>Feed Pump:</strong> 2 x 100% capacity<br><strong>Blow Down:</strong> Daily to remove sludge<br><strong>Treatment:</strong> Phosphate + Hydrazine + pH control<br><strong>Test:</strong> Water daily, safety valve monthly',

// ===== MEDICAL - 150 TOPICS =====
'cpr': '<strong>CPR - Cardio Pulmonary Resuscitation</strong><br><br><strong>Ratio:</strong> 30 compressions : 2 breaths<br><strong>Rate:</strong> 100-120 compressions per minute<br><strong>Depth:</strong> 5-6cm for adults<br><strong>Location:</strong> Center of chest, lower half of sternum<br><strong>Recovery Position:</strong> For unconscious but breathing person'

// NOTE: Dito mo i-paste lahat ng remaining 1800+ topics mo para kumpleto
};

const recipes = {
  adobo: {name:'Pork Adobo - 20 Crew', ing:['Pork 8kg','Soy sauce 1L','Vinegar 1L','Garlic 500g','Bay leaves 20pcs','Pepper 100g'], proc:'1. Marinate 30min. 2. Sear then add sauce. 3. Simmer 45min.'},
  sinigang: {name:'Pork Sinigang - 20 Crew', ing:['Pork ribs 8kg','Sinigang mix 10 packs','Kangkong 2kg','Labanos 3kg','Sitaw 2kg','Kamatis 2kg'], proc:'1. Boil pork 1hr. 2. Add veggies. 3. Add sinigang mix last 5min.'},
  beefsteak: {name:'Beef Steak Tagalog - 20 Crew', ing:['Beef sirloin 7kg','Soy sauce 800ml','Calamansi 50pcs','Onions 3kg','Pepper 100g'], proc:'1. Slice beef thin. 2. Marinate 1hr. 3. Fry then caramelize onions.'},
  kinilaw: {name:'Tuna Kinilaw - 20 Crew', ing:['Fresh tuna 6kg','Vinegar 2L','Calamansi 40pcs','Onions 2kg','Ginger 500g','Sili 200g'], proc:'1. Cube tuna. 2. Soak in vinegar 15min. 3. Mix with onions.'}
};

updateDisplay();

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');

  if(tab=='quiz'){
    document.getElementById('quizControls').style.display='flex';
    document.getElementById('searchControls').style.display='none';
    document.getElementById('chat').innerHTML='<div class="msg system"><strong>Quiz Mode</strong><br>Pili ka ng category sa baba.</div>';
  }
  if(tab=='exam'){
    document.getElementById('quizControls').style.display='flex';
    document.getElementById('searchControls').style.display='none';
    document.getElementById('chat').innerHTML='<div class="msg system"><strong>CBT Exam Mode</strong><br>50 Questions | 60 Minutes | 70% to Pass<br><button class="success" onclick="startExam()">Start Exam</button><div class="timer" id="examTimer"></div></div>';
  }
  if(tab=='recipes'){
    document.getElementById('quizControls').style.display='none';
    document.getElementById('searchControls').style.display='none';
    showRecipes();
  }
  if(tab=='search'){
    document.getElementById('quizControls').style.display='none';
    document.getElementById('searchControls').style.display='flex';
    document.getElementById('chat').innerHTML='<div class="msg system"><strong>Search Mode</strong><br>Type SOLAS, MARPOL, Rule 5, etc.</div>';
  }
}

function startQuiz(cat){
  let topics = Object.keys(db).filter(k=>k.includes(cat));
  if(topics.length==0) return showToast('No topics found for '+cat);
  let randomTopic = topics[Math.floor(Math.random()*topics.length)];
  addMsg(db[randomTopic], 'quiz');
}

function searchDB(){
  let q = document.getElementById('q').value.toLowerCase().trim();
  if(!q) return;
  addMsg(q, 'user');
  let result = db[q] || 'Topic not found. Try: solas, marpol, colregs, rule 5, epirb';
  addMsg(result, 'bot');
  document.getElementById('q').value='';
}

function addMsg(text, type){
  let div=document.createElement('div');
  div.className='msg '+type;
  div.innerHTML=text;
  document.getElementById('chat').appendChild(div);
  document.getElementById('chat').scrollTop=999;
}

function startExam(){
  let allTopics = Object.keys(db);
  examQuestions = allTopics.sort(()=>0.5-Math.random()).slice(0,50);
  examIndex=0; score=0; totalQuestions=0; correctAnswers=0; timeLeft=3600;
  showExamQuestion();
  clearInterval(examTimer);
  examTimer=setInterval(()=>{
    timeLeft--;
    let mins=Math.floor(timeLeft/60), secs=timeLeft%60;
    let t=document.getElementById('examTimer');
    if(t) {
      t.textContent=`Time Left: ${mins}:${secs<10?'0'+secs:secs}`;
      if(timeLeft<300) t.classList.add('warning');
    }
    if(timeLeft<=0){clearInterval(examTimer); finishExam();}
  },1000);
}

function showExamQuestion(){
  if(examIndex>=examQuestions.length){finishExam(); return;}
  let topic = examQuestions[examIndex];
  document.getElementById('chat').innerHTML = `
    <div class="msg quiz">
      <div>Question ${examIndex+1} of 50</div>
      <strong>${topic.toUpperCase()}</strong><br>
      ${db[topic]}
      <button class="success" onclick="examNext()" style="margin-top:10px">Next Question</button>
    </div>
  `;
  examIndex++;
  totalQuestions++;
  correctAnswers++;
  score+=2;
  updateDisplay();
}

function examNext(){showExamQuestion();}

function finishExam(){
  clearInterval(examTimer);
  let percent=Math.round(correctAnswers/50*100);
  let result = percent>=70? 'PASSED! Congrats!' : 'FAILED. Review more.';
  document.getElementById('chat').innerHTML = `
    <div class="msg system" style="border-color:var(--success)">
      <h3>Exam Result: ${result}</h3>
      <p>Score: ${correctAnswers}/50 = ${percent}%</p>
      <button class="success" onclick="startExam()">Retake Exam</button>
    </div>
  `;
}

function showRecipes(){
  let html='<div class="msg system"><strong>Galley Recipes - Good for 20 Crew</strong></div>';
  Object.keys(recipes).forEach(key=>{
    let r=recipes[key];
    html+=`<div class="msg recipe-card"><h3>${r.name}</h3><strong>Ingredients:</strong><div class="recipe-ingredients">${r.ing.map(i=>'• '+i).join('<br>')}</div><strong style="margin-top:10px; display:block">Procedure:</strong><div style="font-size:13px">${r.proc}</div></div>`;
  });
  document.getElementById('chat').innerHTML=html;
}

function updateDisplay(){
  document.getElementById('score').textContent=score;
  document.getElementById('streak').textContent=streak;
  let acc = totalQuestions>0? Math.round(correctAnswers/totalQuestions*100) : 0;
  document.getElementById('accuracy').textContent=acc+'%';
  let rankIndex = Math.min(Math.floor(acc/15), ranks.length-1);
  document.getElementById('rank').textContent = ranks[rankIndex];
  localStorage.setItem('mtcScore',score);
}

function showToast(msg){
  let t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',2000);
}
