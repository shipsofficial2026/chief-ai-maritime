<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chief AI V4.1 TRANSLATOR</title>
<style>
body{margin:0;background:#0a1929;color:#fff;font:18px Arial}
h3{text-align:center;padding:10px;background:#1a2332;color:#4fc3f7;margin:0}
#chat{height:60vh;overflow:auto;padding:12px}
.msg{margin:8px 0;line-height:1.6}
.u{text-align:right;color:#4fc3f7}
.a{text-align:left}
input{width:70%;padding:15px;font-size:18px;background:#0d1b2a;color:#fff;border:2px solid #4fc3f7;border-radius:20px}
button{width:25%;padding:15px;background:#4fc3f7;border:0;border-radius:20px;font-size:18px;font-weight:bold}
a.video,a.link{background:red;color:#fff;padding:6px 10px;border-radius:5px;text-decoration:none;font-size:16px;margin:2px;display:inline-block}
.trans{color:#00ff00;font-weight:bold}
</style>
</head>
<body>
<h3>⚓ Chief AI V4.1 - WITH TRANSLATOR</h3>
<div id=chat><div class=msg a><b>AI:</b> Boss! Translator ON! Type: "translate mag-ingat ka" o "translate take care"</div></div>
<div style="padding:10px;display:flex;gap:8px">
<input id=q placeholder="translate ___ boss..." onkeypress="if(event.key==13)ask()">
<button onclick=ask()>➤</button>
</div>

<script>
const dict={
// TAGALOG → ENGLISH
'mag-ingat ka':'Take care boss!',
'salamat':'Thank you!',
'kumusta ka':'How are you?',
'gutom na ako':'I am hungry',
'pagod na ako':'I am tired',
'tulong':'Help!',
'apoy':'Fire!',
'tigil':'Stop!',
'bilis':'Hurry up!',
'ingat sa duty':'Be careful on duty',
// ENGLISH → TAGALOG
'take care':'Mag-ingat ka boss!',
'thank you':'Salamat!',
'how are you':'Kumusta ka?',
'i am hungry':'Gutom na ako',
'i am tired':'Pagod na ako',
'help':'Tulong!',
'fire':'Apoy!',
'stop':'Tigil!',
'hurry':'Bilis!',
'be careful':'Mag-ingat ka!',
// MARITIME + LAHAT NG LUMA
'fire':'AI: FIRE! PASS method! <a class=video href="https://youtube.com/results?search_query=fire+extinguisher" target=_blank>▶️ VIDEO</a>',
'adobo':'AI: ADOBO 🍗 Gisa bawang+karne+Toyo+Suka+30mins=Tapos!',
'bowline':'AI: BOWLINE KNOT! <a class=video href="https://youtube.com/results?search_query=bowline+knot" target=_blank>▶️ VIDEO</a>',
'weather':'AI: Check Windy.com boss! <a class=link href="https://windy.com" target=_blank>🌪️ WEATHER</a>',
'joke':'AI: Bakit di nalulunod Chief Engineer? Laging afloat utak! HAHA',
'workout':'AI: Pushups 20x + Squats 30x + Plank 1min!',
'ipon':'AI: 70% padala, 20% ipon, 10% gastos boss!'
};

function ask(){
let q=document.getElementById('q').value.toLowerCase().trim();
let chat=document.getElementById('chat');
if(!q)return;
chat.innerHTML+=`<div class=msg u><b>You:</b> ${document.getElementById('q').value}</div>`;

let ans='AI: Boss type "translate [word]" Example: translate mag-ingat ka';

if(q.startsWith('translate ')){
 let word=q.replace('translate ','').trim();
 if(dict[word]){
   ans=`AI: <span class=trans>"${document.getElementById('q').value.replace('translate ','')}"</span> = <span class=trans>"${dict[word]}"</span>`;
 }else{
   ans=`AI: Boss wala pa sa dictionary ko yung "${word}". Try mo: salamat, kumusta, tulong, fire, take care`;
 }
}else{
 for(let k in dict){if(q.includes(k)){ans=dict[k];break;}}
}

chat.innerHTML+=`<div class=msg a><b>${ans}</b></div>`;
document.getElementById('q').value='';
chat.scrollTop=99999;
}
</script>
</body>
</html>
