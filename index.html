<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chief AI</title>
<style>
body{background:#000;color:#0f0;font-family:Arial;padding:10px}
.chat{height:350px;overflow:auto;border:2px solid #0f0;padding:8px;margin:5px 0;border-radius:8px;font-size:14px}
input,button{padding:10px;margin:3px;font-size:15px;border-radius:5px;border:1px solid #0f0}
input{background:#111;color:#0f0;width:68%}
button{background:#0f0;color:#000;border:none;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<h3>🤖 Chief AI - Barko + Lahat Alam</h3>
<div class="chat" id="chat">Boss: Tanong ka kahit ano kay Chief AI<br>Try mo: rule 5, 2+2, may crush ako</div>
<input id="ask" placeholder="Chief tanong ko...">
<button onclick="ask()">Send</button>

<script>
// DITO MO ILALAGAY KEY MO BOSS - PALITAN MO LANG YUNG NASA QUOTES
const API_KEY =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

const offlineBrain = {
"rule 5": "Rule 5 LOOK-OUT boss: Dapat may tao nagbabantay 24/7. Mata + tenga + radar.",
"rule 15": "Rule 15 CROSSING boss: Barko sa kanan = HARI. Ikaw give way.",
"solas": "SOLAS boss: Lifeboat drill monthly. Fire drill weekly pag nasa port.",
"nuc": "NUC boss: Not Under Command = 2 red lights vertical. Walang galaw."
};

async function ask(){
let t=document.getElementById('ask').value.toLowerCase().trim();
let c=document.getElementById('chat');
if(!t) return;
c.innerHTML += "<br><b>You:</b> "+t;

// 1. OFFLINE MUNA - pag barko tanong
for(let key in offlineBrain){
if(t.includes(key)){
c.innerHTML += "<br><b>Chief AI [OFFLINE]:</b> "+offlineBrain[key];
c.scrollTop = c.scrollHeight;
document.getElementById('ask').value='';
return;
}
}

// 2. GROQ API - pag kahit ano tanong
c.innerHTML += "<br><b>Chief AI:</b> Tatawag kay Groq boss...";
try{
let res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
method: "POST",
headers: {
"Authorization": "Bearer "+API_KEY,
"Content-Type": "application/json"
},
body: JSON.stringify({
model: "llama-3.1-8b-instant",
messages: [{"role":"user","content":"Sagot ka bilang Chief Officer pero friendly. Tagalog + English mix. Kahit ano tanong pwede: math, chika, barko, advice. Short lang 2-3 sentences. Tanong: "+t}],
max_tokens: 200
})
});
let data = await res.json();
let sagot = data.choices[0].message.content;
c.innerHTML = c.innerHTML.replace("Tatawag kay Groq boss...","<b>Chief AI [ONLINE]:</b> "+sagot);
}catch(e){
c.innerHTML += "<br><b>Chief AI:</b> Boss walang internet. Barko lang alam ko offline: rule 5, rule 15, solas.";
}
c.scrollTop = c.scrollHeight;
document.getElementById('ask').value='';
}

// Enter key din pwede
document.getElementById('ask').addEventListener('keypress',function(e){
if(e.key==='Enter') ask();
});
</script>
</body>
</html>
