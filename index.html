<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chief AI V5.0 — Maritime Training Center ⚓</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: linear-gradient(180deg, #0a1929 0%, #0d1b2a 100%);
            color: #e0f7fa;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #1a2332;
            padding: 15px;
            text-align: center;
            border-bottom: 4px solid #00b4d8;
        }
        h3 { color: #4fc3f7; font-size: 23px; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; background: #0d1b2a; }
        .msg { margin: 15px 0; padding: 14px 18px; border-radius: 18px; max-width: 90%; }
        .u { background: #4fc3f7; color: #0a1929; margin-left: auto; }
        .a { background: #1e2a44; }
        .quiz { color: #ffd700; font-weight: bold; }
        .correct { color: #00ff88; font-weight: bold; }
        .input-area {
            padding: 15px;
            background: #1a2332;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 16px;
            font-size: 17px;
            background: #0d1b2a;
            color: #fff;
            border: 2px solid #4fc3f7;
            border-radius: 30px;
        }
        button {
            padding: 16px 24px;
            background: #4fc3f7;
            color: #0a1929;
            border: none;
            border-radius: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header><h3>⚓ Chief AI V5.0 — Maritime Training Center</h3></header>
    
    <div id="chat">
        <div class="msg a">
            <b>AI:</b> Boss! Full Maritime Training Center V5.0 is ready!<br>
            Drills, Quizzes, Procedures, COLREGS, SOLAS, MARPOL, GMDSS, at marami pa.<br>
            Type <b>help</b> to see all commands.
        </div>
    </div>

    <div class="input-area">
        <input id="q" placeholder="help, quiz, abandon ship, man overboard..." 
               onkeypress="if(event.key==='Enter') ask()">
        <button onclick="ask()">Send</button>
    </div>

<script>
const dict = {
    'help': 'AI: <b>Commands:</b><br>• help<br>• quiz<br>• fire drill<br>• lifeboat<br>• abandon ship<br>• man overboard<br>• colregs / rule 5 / rule 15<br>• marpol<br>• solas<br>• gmdss<br>• ism / isps<br>• bowline<br>• cpr<br>• epirb / sart<br>• stcw / bt / aff<br>• adobo / sinigang',

    // QUIZ
    'quiz': 'AI: <span class="quiz">QUIZ #1</span><br>Q: How many flares required in each lifeboat?<br>A)4 B)6 C)12<br>Reply A, B, or C',

    '6': 'AI: <span class="correct">CORRECT BOSS!</span> 6 flares + 2 rockets = SOLAS standard!',
    'b': 'AI: <span class="correct">CORRECT BOSS!</span> 6 flares + 2 rockets = SOLAS standard!',

    // DRILLS
    'fire drill': 'AI: FIRE DRILL: 1. Sound Alarm 2. Don BA Set 3. Muster 4. Boundary Cooling 5. Extinguish',
    'lifeboat': 'AI: LIFEBOAT DRILL: Suit up (30sec) → Board → Lower → Release hooks → Row away',
    'abandon ship': 'AI: ABANDON SHIP: 1. Sound alarm 2. Lifejacket/Immersion suit 3. Go to station 4. Board lifeboat 5. Release & row away from vessel',
    'man overboard': 'AI: MAN OVERBOARD (MOB): Shout "Man Overboard!", Throw lifebuoy + smoke, Mark position, Inform bridge, Launch rescue boat',

    // COLREGS
    'colregs': 'AI: COLREGS Key Rules:<br>• Rule 5: Proper Lookout<br>• Rule 15: Crossing Situation (Give way to starboard)<br>• Rule 19: Restricted Visibility',
    'rule 5': 'AI: RULE 5 — Every vessel shall maintain a proper lookout by sight and hearing at all times.',
    'rule 15': 'AI: RULE 15 — When two vessels are crossing, the vessel with the other on her starboard side shall keep out of the way.',

    // REGULATIONS
    'marpol': 'AI: MARPOL Annex I: Oil discharge prohibited within 12 nautical miles from land (<15 ppm).',
    'solas': 'AI: SOLAS — Safety of Life at Sea. Covers lifeboats, fire safety, GMDSS, etc.',
    'gmdss': 'AI: GMDSS Areas: A1 (VHF), A2 (MF), A3 (Satellite), A4 (Polar). Check which sea area your ship is in.',
    'ism': 'AI: ISM Code: International Safety Management Code. Every ship must have SMS (Safety Management System).',
    'isps': 'AI: ISPS Code: International Ship and Port Facility Security Code. Level 1, 2, 3 security levels.',

    // MEDICAL
    'cpr': 'AI: CPR = 30 compressions : 2 breaths. Rate 100-120/min. Depth 5-6 cm.',

    // RECIPES
    'adobo': 'AI: ADOBO: Garlic → Meat → Soy sauce + Vinegar → Pepper → Simmer 30-45 mins.',
};

function ask() {
    const input = document.getElementById('q');
    let q = input.value.trim().toLowerCase();
    const chat = document.getElementById('chat');

    if (!q) return;

    chat.innerHTML += `<div class="msg u"><b>You:</b> ${input.value}</div>`;

    let ans = 'AI: Boss, type <b>help</b> for all training commands.';

    for (let key in dict) {
        if (q.includes(key)) {
            ans = dict[key];
            break;
        }
    }

    chat.innerHTML += `<div class="msg a"><b>${ans}</b></div>`;
    
    input.value = '';
    chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
